# yaml-language-server: $schema=../../../schema/lifelong-scenario.schema.json

map: ../../maps/corridor.yaml
params: ../../params/default.yaml

robots:
  - {id: R0, start: 0, home: 0}
  - {id: R1, start: 5, home: 5}
  - {id: R2, start: 1, home: 1}
  - {id: R3, start: 4, home: 4}
  - {id: R4, start: 2, home: 2}
  - {id: R5, start: 7, home: 7}
  - {id: R6, start: 3, home: 3}
  - {id: R7, start: 6, home: 6}

scenario:
  replan_policy: replan_on_assignment
  events:
    - {id: e0, type: assign_goal, robot: R0, goal: 5, when: {type: at_start}}
    - {id: e1, type: assign_goal, robot: R1, goal: 0, when: {type: at_start}}
    - {id: e2, type: assign_goal, robot: R2, goal: 4, when: {type: at_start}}
    - {id: e3, type: assign_goal, robot: R3, goal: 1, when: {type: at_start}}
    - {id: e4, type: assign_goal, robot: R4, goal: 7, when: {type: at_start}}
    - {id: e5, type: assign_goal, robot: R5, goal: 2, when: {type: at_start}}
    - {id: e6, type: assign_goal, robot: R6, goal: 6, when: {type: at_start}}
    - {id: e7, type: assign_goal, robot: R7, goal: 3, when: {type: at_start}}
    - {id: e8,  type: assign_goal, robot: R3, goal: 10, when: {type: after_initial}}
    - {id: e9,  type: assign_goal, robot: R2, goal: 8,  when: {type: after_initial}}

    - {id: e10, type: assign_goal, robot: R1, goal: 1, when: {type: on_robot_idle, robot: R1}, after: e8}
    - {id: e11, type: assign_goal, robot: R4, goal: 4, when: {type: on_robot_idle, robot: R4}, after: e9}

    - {id: e12, type: assign_goal, robot: R5, goal: 0, when: {type: on_robot_idle, robot: R5}, after: e10}
    - {id: e13, type: assign_goal, robot: R6, goal: 7, when: {type: on_robot_idle, robot: R6}, after: e11}

    - {id: e14, type: assign_goal, robot: R7, goal: 2, when: {type: on_robot_idle, robot: R7}, after: e12}
    - {id: e15, type: assign_goal, robot: R0, goal: 6, when: {type: on_robot_idle, robot: R0}, after: e13}

    - {id: e16, type: assign_goal, robot: R2, goal: 3, when: {type: on_robot_idle, robot: R2}, after: e14}
    - {id: e17, type: assign_goal, robot: R3, goal: 5, when: {type: on_robot_idle, robot: R3}, after: e15}
