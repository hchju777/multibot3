# pysim.params.yaml — [0a] tracer bullet 파라미터 (mrs_bringup = Composition Root)
#
# ⛔ 수치 창작 금지 규율: 아래 값 중 **근거가 있는 것과 없는 것을 구분해 표기**한다.
#    - `[확정]` : theory·계약이 값을 고정한 것
#    - `[구성]` : 시나리오 구성값. 측정 대상이 아니라 실험자가 고르는 값
#    - `[0a 실측]` : **placeholder 다.** [0a] tracer bullet 실측 전까지 근거가 없으며,
#                    실측 후 이 파일에서 교체한다. 이 값으로 실험 N·반복 수를 정하지 말 것(R-01).
#
# ⚠ launch 인자로 덮이는 키: robot_count · sim_backend · replan_period_s · sim_step_s ·
#    step_wall_period_s (+ 선택 인자 initial_x_m · initial_y_m · initial_theta_rad).
#    같은 값이 두 곳에 있는 것이 아니라, **launch 가 정본**이고 여기 값은 단독 실행 시의
#    기본값이다(`ros2 run` 으로 노드 하나만 띄우는 경우).
#
# ⚠ 그 "launch 가 정본"이 **어떻게** 성립하는지 (0a 보고서 §4-① 수리 — 이전에는 거짓이었다):
#    `_common.launch.py` 는 이 파일을 **읽어서** launch 인자를 위 정확한 노드 이름 블록에 써 넣은
#    새 YAML 을 만들고, 그 파일 하나만 노드에 넘긴다. 노드에 dict 오버라이드를 따로 주지 않는다.
#    이유: launch_ros 의 dict 오버라이드는 임시 파일에 `/**:` 와일드카드로 실리는데, rcl 은
#    **정확한 노드 이름이 와일드카드를 이기므로**(파일 순서 무관) 아래 블록의 같은 키가 launch
#    인자를 조용히 이겼다. [0a] 는 `robot_count:=4` 로 띄우고도 sim_bridge·pp_service 가 2 로
#    돌았고, 그 탓에 아래 initial_x_m 길이 검사 가드가 **발동조차 하지 않았다**.
#    ⇒ 이 파일에서 키를 지울 필요는 없다. 단독 실행 기본값으로서 그대로 의미가 있다.

# ── 전 노드 공통 ───────────────────────────────────────────────────────────────────────
/**:
  ros__parameters:
    # [확정] 계약 §0 전역 규약: 시각은 시뮬 시계, 벽시계 혼용 금지.
    # ⚠ `sim_bridge` 도 true 다 — 다만 그 노드의 **타이머만** 벽시계로 돈다(nav2-reference §2 C2).
    #    시계의 소유자가 자기 시계를 기다리면 부팅 데드락이다.
    use_sim_time: true

# ── 뷰 스코프의 단일 발급처 ([1] 실 MapRegistry — YAML 로드) ─────────────────────────────
#
# ⚠ 지도 버전·균일 뷰 id 는 **map_registry 가 발급**하고 나머지 노드가 그것을 기대한다. 실 배선
#   ([1])에서는 노드가 로드·세분화로 **발급**한다(더 이상 파라미터로 읽지 않는다):
#     roadmap_version : 첫 로드 = 1 (단조증가, 0 은 계약이 런타임 금지). 소비자는 latched 토픽
#                       `/map_registry/roadmap_version` 에서 학습하거나 1 을 기대한다.
#     uniform_view_id : 첫 build_uniform = 1 (물리 뷰 0 예약과 충돌 회피). 골격 wire view_id 도
#                       1 이다(종류만 SKELETON — D-j 경계 변환). 소비자 블록의 view_uniform_view_id
#                       = 1 과 정합해야 VIEW_SCOPE_MISMATCH 전량 폐기를 피한다.
#
# roadmap_file 은 **설치된 절대 경로**라 여기 두지 않는다 — launch(_common.launch.py)가 share
# 디렉터리(config/roadmap_fixture.yaml)에서 계산해 주입한다. 노드를 launch 없이 직접 띄우면
# roadmap_file 이 비어 **기동 실패**한다(YAML 필수, tracer 폴백 없음 — 사용자 결정).
map_registry:
  ros__parameters:
    # [구성] 세분화 입도 [m]. iw.hub 하한 2(ρ+L*) = 2.211518 이상. 픽스처 엣지 길이 2.4 > 2.30 이라
    #   세분화는 항등(seg = floor(2.4/2.3) = 1, 가상 노드 0개 — tracer 와 같은 균일 뷰 구조).
    unit_length_m: 2.30
    # [iw.hub 실측] NID점 기준 몸체 외접 반경 ρ [m]. 세분화 하한 2(ρ+L*) 계산에 쓴다(창작 금지).
    inflation_radius_m: 0.787904
    # [iw.hub 실측] NID 오프셋 L* [m]. 하한 2(ρ+L*) 의 나머지 항.
    nid_offset_l_m: 0.317855

# ── L2 더미 (고정 경로) ────────────────────────────────────────────────────────────────
pp_service:
  ros__parameters:
    # [구성] [0a] = 로봇 2대. ⚠ launch 가 robot_count 인자를 이 노드에도 주입한다 —
    #   주입이 빠지면 robot_count:=4 로 띄워도 pp 만 조용히 2대분 계획을 낸다.
    robot_count: 2
    # [구성] 고정 계획 재발행 주기 [s]. 0 = 기동 시 1회만.
    #   **0 으로 두지 않는 이유(통합 시 발견)**: [0a] 의 측정 항목은 "창 발행→로봇 수신 지연"
    #   이고 지연은 표본이 여러 개여야 분포를 말할 수 있다. 1회 발행은 표본 1개다.
    #   부수 효과가 더 중요하다 — 발행이 1회뿐이면 그 1회가 실패했을 때 남는 신호도 1회뿐인데,
    #   `RCLCPP_*_THROTTLE` 은 **시뮬 시계가 0 에서 시작하는 동안 첫 스로틀 창(5 s)을 통째로
    #   삼킨다**(마지막 기록 시각 초기값 0 + 5 s > 현재 시뮬 시각). 그래서 실제로 배관이 막혀
    #   있는데도 로그가 완전히 조용했다. 재시도가 있으면 5 시뮬초 뒤부터 반드시 드러난다.
    auto_plan_period_s: 2.0

# ── 기동 거부 검사 (R-A2) ──────────────────────────────────────────────────────────────
bringup_startup_check:
  ros__parameters:
    # [확정] Δt_h 기본 0.1 s — theory T1 §6.1, 계약 L-15(Q-11 해소). 조건 N4: Δt_h < Δt(=0.5 s).
    replan_period_s: 0.1
    # [0a 실측] 시뮬 스텝 dt. 0.05 는 문헌·확정 근거가 없는 placeholder 다.
    #   R-A2: replan_period_s 는 이 값의 정수배여야 한다(0.1 / 0.05 = 2 → 통과).
    sim_step_s: 0.05

# ── 시간의 소유자 겸 sim 추상화 통로 ───────────────────────────────────────────────────
sim_bridge:
  ros__parameters:
    # [구성] [0a] = 로봇 2대.
    robot_count: 2
    # [확정 절차] 백엔드 선택은 config 한 줄(architecture §5.1, R-01).
    #   [0a] 는 "fake"(인프로세스 FakeSimBackend, 이미 구현·검증됨)로 통과한다.
    #   "pysim"/"isaac" 은 C++ 프로세스 어댑터 미구현이라 **기동을 거부**한다(조용한 대체 금지).
    sim_backend: "fake"
    # [0a 실측] 위 bringup_startup_check.sim_step_s 와 **반드시 같아야 한다** — launch 가 두
    #   노드에 같은 값을 주입해 그 일치를 강제한다. 어긋나면 R-A2 검사가 거짓 통과한다.
    sim_step_s: 0.05
    # [0a 실측] 자동 스텝의 벽시계 주기. sim_step_s 와 같게 두면 공칭 배속 1.0 — 이는 "실시간
    #   페이싱"이라는 **정의값**이지 측정치가 아니다. 실제 배속은 realtime_factor 지표로 잰다.
    step_wall_period_s: 0.05
    # [0a 실측] /clock 재발행 주기(벽시계). 스텝보다 촘촘해야 늦게 뜬 노드가 즉시 시각을 얻는다.
    clock_publish_wall_period_s: 0.01
    # [구성] true = sim_bridge 가 스스로 세계를 굴린다. false 로 두면 /sim/step 서비스로만
    #   전진하며, 그것이 bench_runner 의 lockstep 구동 경로다(R-A3 배리어 실험 — Q-15).
    auto_step: true
    # [0a 실측] cmd_vel 워치독 상한. 계약 §3 의 deadline(2·주기)과 정합해야 하나 그 '주기'가
    #   아직 미확정(Q-16)이라 값의 근거가 없다 — placeholder 다.
    cmd_vel_timeout_s: 0.5
    # [구성] 배속 지표 보고 주기(시뮬 시각 기준).
    realtime_report_period_s: 1.0
    # [구성] 결정론 재현 키. 같은 시드 + 같은 지령열 = 같은 궤적.
    sim_seed: 0
    # [구성] 로봇 반지름 [m]. 기하 충돌 판정에만 쓴다(접촉력 없음 — 충실도 NONE).
    robot_radius_m: 0.3
    # [구성] 노드 부착 반경 [m]. [0a] 는 노드 부착 표가 비어 있어 실제로는 쓰이지 않는다.
    node_attach_radius_m: 0.25
    # [구성] actuate → 상태 반영 지연 [s]. 0 = 즉시 반영. architecture §5.2 누수 조기 발견용
    #   스윕축이다 — 0 보다 크게 올려 코어가 "즉시 반영"을 전제하는지 확인할 수 있다.
    actuate_to_state_latency_s: 0.0
    # [구성] 초기 배치. ⚠ [2] 부착 배선: 로봇을 **균일 뷰 격자 노드 위**에 얹어야 sim_bridge 가
    #   그 노드에 부착하고 RobotState.occupied_node 가 유효값을 보고한다(격자 간격 2.4). 로봇 0 =
    #   (0,0)=n0, 로봇 1 = (2.4,0)=n1 — pp_service 가 로봇 i 에게 주는 route 시작 노드와 정합한다.
    #   부착 반경은 node_attach_radius_m(0.25)이므로 노드에서 그보다 멀면 부착되지 않는다.
    #   ⚠ 길이가 robot_count 와 다르면 sim_bridge 는 **기동을 거부**한다(자세를 추측하지 않는다).
    initial_x_m: [0.0, 2.4]
    initial_y_m: [0.0, 0.0]
    initial_theta_rad: [0.0, 3.141592653589793]
    # [구성] **= map_registry 발급값**. sim_bridge 는 MapRegistry 서비스를 호출하지 않으므로
    #   (백엔드가 뷰를 모른다 — 계약 L-16 "부착 자체를 하지 말 것") 발급값을 파라미터로 받는다.
    #   ⚠ 위 map_registry 블록과 반드시 같은 값이어야 한다. 다르면 RobotState 를 받는
    #     l4_traj_node 의 convert 가 VIEW_SCOPE_MISMATCH 로 전량 폐기한다.
    view_roadmap_version: 1
    view_uniform_view_id: 1

# ── 사다리 (로그 전용) ─────────────────────────────────────────────────────────────────
ladder_orchestrator:
  ros__parameters:
    # [구성] **= map_registry 발급 uniform_view_id**. `expected_roadmap_version` 은 선언하지
    #   않는다 — 0(기본)이면 `/map_registry/roadmap_version` latched 토픽에서 학습한다.
    #   view_id 는 학습 경로가 없어(클라이언트측 convert 부재) 파라미터가 유일한 출처다.
    expected_view_id: 1

# ── L4 (per-robot, /robot_{i} 네임스페이스) ────────────────────────────────────────────
#   `/**/` 와일드카드로 모든 로봇 네임스페이스의 같은 이름 노드에 적용한다.
/**/l4_traj_node:
  ros__parameters:
    # [구성] = map_registry 발급 uniform_view_id (위 ladder_orchestrator 와 같은 이유).
    #   ⚠ 이 값이 sadg 가 창에 싣는 view_id·sim_bridge 가 RobotState 에 싣는 view_id 와
    #     하나라도 어긋나면 창과 상태가 **전량 폐기**되어 [0a] 측정이 0 건이 된다.
    expected_view_id: 1

# ── 틱의 소유자 ────────────────────────────────────────────────────────────────────────
plan_tick_node:
  ros__parameters:
    # [확정] theory T1 §6.1 / 계약 L-15. R-A2 상 sim_step_s 의 정수배여야 한다.
    replan_period_s: 0.1

# ── pysim 백엔드 프로세스 (형태 고정용 — [0a] 통과 경로가 아니다) ────────────────────────
pysim_backend:
  ros__parameters:
    sim_step_s: 0.05
    seed: 0
    robot_radius_m: 0.3
    # [구성] = sim_bridge 블록과 같은 격자-노드 배치(로봇 0=n0(0,0), 로봇 1=n1(2.4,0)).
    initial_x_m: [0.0, 2.4]
    initial_y_m: [0.0, 0.0]
    initial_theta_rad: [0.0, 3.141592653589793]
    # [구성] = map_registry 발급값 (위 sim_bridge 블록과 같은 이유·같은 값).
    view_roadmap_version: 1
    view_uniform_view_id: 1
